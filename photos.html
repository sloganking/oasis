<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oasis — Photos</title>
    <style>
        :root {
            --ocean-deep: #0a1628;
            --ocean-mid: #1a3a5c;
            --ocean-light: #2d6187;
            --sand: #f4e8d3;
            --sand-light: #faf5ed;
            --coral: #e8785a;
            --foam: #d4eaf7;
            --gold: #c9a84c;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', serif;
            color: var(--ocean-deep);
            background: var(--sand-light);
            line-height: 1.7;
        }

        header {
            background: linear-gradient(135deg, var(--ocean-deep) 0%, var(--ocean-mid) 100%);
            color: var(--sand);
            padding: 3rem 2rem;
            text-align: center;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-bottom: 0.3rem;
        }

        header p {
            opacity: 0.8;
            font-style: italic;
        }

        header a {
            color: var(--sand);
            opacity: 0.7;
            font-size: 0.9rem;
        }

        .gallery-section {
            max-width: 900px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }

        .gallery-section h2 {
            font-size: 1.5rem;
            font-weight: 400;
            color: var(--ocean-mid);
            margin-bottom: 1rem;
            border-bottom: 2px solid var(--foam);
            padding-bottom: 0.5rem;
        }

        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1rem;
            margin-bottom: 3rem;
        }

        .photo-grid img {
            width: 100%;
            border-radius: 10px;
            box-shadow: 0 2px 10px rgba(10, 22, 40, 0.1);
            aspect-ratio: 4/3;
            object-fit: cover;
            transition: transform 0.2s;
        }

        .photo-grid img:hover {
            transform: scale(1.02);
        }

        @media (max-width: 600px) {
            .photo-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
