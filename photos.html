<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oasis — Photos</title>
    <style>
        :root {
            --ocean-deep: #0a1628;
            --ocean-mid: #1a3a5c;
            --ocean-light: #2d6187;
            --sand: #f4e8d3;
            --sand-light: #faf5ed;
            --coral: #e8785a;
            --foam: #d4eaf7;
            --gold: #c9a84c;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', serif;
            color: var(--ocean-deep);
            background: var(--sand-light);
            line-height: 1.7;
        }

        header {
            background: linear-gradient(135deg, var(--ocean-deep) 0%, var(--ocean-mid) 100%);
            color: var(--sand);
            padding: 3rem 2rem;
            text-align: center;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-bottom: 0.3rem;
        }

        header p {
            opacity: 0.8;
            font-style: italic;
        }

        header a {
            color: var(--sand);
            opacity: 0.7;
            font-size: 0.9rem;
        }

        .gallery-section {
            max-width: 900px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }

        .gallery-section h2 {
            font-size: 1.5rem;
            font-weight: 400;
            color: var(--ocean-mid);
            margin-bottom: 1rem;
            border-bottom: 2px solid var(--foam);
            padding-bottom: 0.5rem;
        }

        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1rem;
            margin-bottom: 3rem;
        }

        .photo-grid img {
            width: 100%;
            border-radius: 10px;
            box-shadow: 0 2px 10px rgba(10, 22, 40, 0.1);
            aspect-ratio: 4/3;
            object-fit: cover;
            transition: transform 0.2s;
        }

        .photo-grid img:hover {
            transform: scale(1.02);
            cursor: pointer;
        }

        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .lightbox.active {
            display: flex;
            touch-action: none;
        }

        .lightbox img {
            max-width: 100%;
            max-height: 90vh;
            border-radius: 8px;
            object-fit: contain;
        }

        .lightbox-close {
            position: fixed;
            top: 1rem;
            right: 1.5rem;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            z-index: 1001;
            background: none;
            border: none;
            opacity: 0.8;
        }

        .lightbox-close:hover {
            opacity: 1;
        }

        .lightbox-nav {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            color: white;
            font-size: 2.5rem;
            cursor: pointer;
            z-index: 1001;
            background: none;
            border: none;
            opacity: 0.7;
            padding: 1rem;
            touch-action: manipulation;
        }

        .lightbox-nav:hover {
            opacity: 1;
        }

        .lightbox-prev {
            left: 1rem;
        }

        .lightbox-next {
            right: 1rem;
        }

        @media (max-width: 600px) {
            .photo-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<header>
    <h1>Oasis</h1>
    <p>Photo Tour</p>
    <a href="index.html">&larr; Back to main page</a>
</header>

        <img src="assets/under the sea/2026-05-25_17-37_3.png" alt="Under the Sea">
        <img src="assets/under the sea/2026-05-25_17-38.png" alt="Under the Sea">
        <img src="assets/under the sea/2026-05-25_17-38_1.png" alt="Under the Sea">
        <img src="assets/under the sea/2026-05-25_17-38_2.png" alt="Under the Sea">
        <img src="assets/under the sea/2026-05-25_17-38_3.png" alt="Under the Sea">
        <img src="assets/under the sea/2026-05-25_17-38_4.png" alt="Under the Sea">
        <img src="assets/under the sea/2026-05-25_17-38_5.png" alt="Under the Sea">

    <h2>The Spirit Room — Main House</h2>
    <div class="photo-grid">
        <img src="assets/spirit room/2026-05-25_17-41.png" alt="Spirit Room">

        <img src="assets/spirit room/2026-05-25_17-42_1.png" alt="Spirit Room">
        <img src="assets/spirit room/2026-05-25_17-43.png" alt="Spirit Room">
    </div>

    <h2>The Music Room — Main House</h2>
    <div class="photo-grid">
        <img src="assets/Music room/2026-05-25_17-43.png" alt="Music Room">
        <img src="assets/Music room/2026-05-25_17-43_1.png" alt="Music Room">
        <img src="assets/Music room/2026-05-25_17-43_2.png" alt="Music Room">
        <img src="assets/Music room/2026-05-25_17-44.png" alt="Music Room">
    </div>

    <h2>The Goddess Room — Casita</h2>
    <p style="font-style: italic; opacity: 0.6; margin-bottom: 2rem;">Photos coming soon.</p>

    <h2>The Property</h2>
    <div class="photo-grid">
        <img src="assets/house front.png" alt="House Front">
        <img src="assets/house front with sun.png" alt="House Front with Sun">
        <img src="assets/casita external.png" alt="Casita External">
    </div>
</div>

<div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lightbox-close">&times;</button>
    <button class="lightbox-nav lightbox-prev" id="lightbox-prev">&#8249;</button>
    <button class="lightbox-nav lightbox-next" id="lightbox-next">&#8250;</button>
    <img id="lightbox-img" src="" alt="">
</div>

<script>
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');
    const allImages = Array.from(document.querySelectorAll('.photo-grid img'));
    let currentIndex = 0;

    function showImage(index) {
        currentIndex = index;
        lightboxImg.src = allImages[index].src;
        lightbox.classList.add('active');
    }

    allImages.forEach((img, i) => {
        img.addEventListener('click', () => showImage(i));
    });

    document.getElementById('lightbox-prev').addEventListener('click', (e) => {
        e.stopPropagation();
        currentIndex = (currentIndex - 1 + allImages.length) % allImages.length;
        lightboxImg.src = allImages[currentIndex].src;
    });

    document.getElementById('lightbox-next').addEventListener('click', (e) => {
        e.stopPropagation();
        currentIndex = (currentIndex + 1) % allImages.length;
        lightboxImg.src = allImages[currentIndex].src;
    });

    lightbox.addEventListener('click', (e) => {
        if (e.target === lightbox || e.target === lightboxImg) {
            lightbox.classList.remove('active');
        }
    });

    document.getElementById('lightbox-close').addEventListener('click', () => {
        lightbox.classList.remove('active');
    });

    document.addEventListener('keydown', (e) => {
        if (!lightbox.classList.contains('active')) return;
        if (e.key === 'ArrowLeft') document.getElementById('lightbox-prev').click();
        if (e.key === 'ArrowRight') document.getElementById('lightbox-next').click();
        if (e.key === 'Escape') lightbox.classList.remove('active');
    });
</script>

</body>
</html>
